name: Documentation or publishing issue / 文档或发布问题
description: Report a public documentation, citation, or publishing problem. 报告公开文档、引用证据或发布问题。
title: "[Docs]: "
labels:
  - documentation
body:
  - type: dropdown
    id: language
    attributes:
      label: Language / 语言
      options:
        - English
        - 简体中文
        - Both / 两者
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Public surface / 公开表面
      options:
        - README or repository map / README 或仓库地图
        - GitHub Pages
        - GitHub Wiki
        - Chapter 1 package / Chapter 1 发布包
        - Citation evidence / 引用证据
        - Hugging Face package
        - Substack package
        - Whitepaper or glossary / 白皮书或术语表
        - Repository configuration / 仓库配置
        - Other / 其他
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / 问题
      description: Describe what is wrong or unclear. 请说明哪里错误或不清楚。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected correction / 期望修正
      description: If you know the desired fix, describe it here. 如果你知道期望的修正方式，请写在这里。
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or links / 证据或链接
      description: Add source links, screenshots, or citation context when relevant. 如相关，请添加来源链接、截图或引用上下文。
